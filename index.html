<!DOCTYPE html>
<html>
<body>
    <h1>SoFIFA Data Fetcher</h1>
    <button id="fetchBtn">Pull Player Data</button>
    <pre id="output">Data will appear here...</pre>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const output = document.getElementById('output');

        // We use a proxy to hide the origin and bypass CORS
        const proxyUrl = "https://cors-anywhere.herokuapp.com/";
        const targetUrl = "https://sofifa.com/players?type=all&hl=en-US"; 

        fetchBtn.onclick = async () => {
            output.textContent = "Fetching...";
            try {
                // The request goes to the proxy, which then requests SoFIFA
                const response = await fetch(proxyUrl + targetUrl, {
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                const html = await response.text();
                
                // Here you would use DOMParser to scrape specific stats
                output.textContent = "Success! Pulled " + html.length + " characters of HTML.";
                console.log(html); 
            } catch (err) {
                output.textContent = "Error: " + err.message;
            }
        };
    </script>
</body>
</html>
